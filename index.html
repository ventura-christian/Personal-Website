<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="christian ventura personal page, home" />
    <title>// christian_ventura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- <span class="page-id">
      <span class="prefix">//</span>
      cv.01 &nbsp; home
      <span class="cursor-blink">&nbsp;</span>
    </span> -->

    <div class="site-grid h-card">
      <nav class="topbar" aria-label="site">
        <a href="index.html" class="topbar-brand accent-a">
          <span class="prefix">//</span>
          cv_
          <span class="cursor-blink">&nbsp;</span>
        </a>
        <ul class="topbar-nav">
          <li>
            <a href="index.html" class="topbar-link is-active" data-idx="01">
              home
            </a>
          </li>
          <li>
            <a href="about.html" class="topbar-link" data-idx="02">about</a>
          </li>
          <li>
            <a href="projects.html" class="topbar-link" data-idx="03">
              projects
            </a>
          </li>
        </ul>
        <span class="topbar-readout" aria-hidden="true">
          // welcome &gt;&gt;&gt; don't_look_behind_you
        </span>
      </nav>

      <main class="content-area">
        <div class="home-layout">
          <span class="graffiti gfx-home-1" aria-hidden="true">
            <img src="assets/svg-images/scribbles/scribble-02.svg" alt="" />
          </span>
          <span class="graffiti gfx-home-2" aria-hidden="true">
            <img src="assets/svg-images/scribbles/scribble-01.svg" alt="" />
          </span>
          <span class="graffiti gfx-home-3" aria-hidden="true">
            <img src="assets/svg-images/character/character-01.svg" alt="" />
          </span>
          <span class="graffiti gfx-home-4" aria-hidden="true">
            <img src="assets/svg-images/character/character-02.svg" alt="" />
          </span>
          <span
            class="graffiti gfx-home-glyph accent-a"
            aria-hidden="true"
          >
            <svg
              viewBox="0 0 100 100"
              fill="none"
              stroke="currentColor"
              stroke-width="4"
              stroke-linejoin="round"
              stroke-linecap="round"
            >
              <polygon
                points="15,85 15,60 30,72 50,38 70,72 85,60 85,85"
              />
              <circle cx="50" cy="38" r="4" fill="currentColor" stroke="none" />
            </svg>
          </span>

          <div class="home-photo face-frame tint-a hover-swap" tabindex="0">
            <div class="frame-inner">
              <img
                src="assets/images/headshot/christian.jpg"
                alt="christian ventura wearing black shirt in front of light background"
                class="u-photo photo-default"
              />
              <img
                src="assets/images/headshot/chin-weird.jpg"
                alt=""
                class="u-photo photo-hover"
                aria-hidden="true"
              />
            </div>
            <span class="tape tape-left" aria-hidden="true"></span>
            <span class="tape tape-right" aria-hidden="true"></span>
          </div>

          <div class="name-banner">
            <h1>
              <span class="prefix">//</span>
              <span class="p-name">cHRISTIAN_vENTURA</span>
            </h1>

            <div class="home-blurbs">
              <span class="blurb-chip">backend dev student</span>
              <span class="blurb-chip">asu aug 2026</span>
              <span class="blurb-chip">united states</span>
            </div>

            <p class="home-tagline">
              <span class="prefix">//</span>
              &gt;&gt; [add your blurb here]
            </p>
          </div>
        </div>
      </main>

      <footer class="site-footer">
        <span class="prefix">//</span>
        copyright c_ventura 2026
      </footer>
    </div>
  </body>
</html>
