<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="christian ventura personal page, project detail">
    <title>// project page</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <span class="page-id">
        <span class="prefix">//</span>cv.03 &nbsp; project.detail
    </span>

    <div class="detail-grid" id="detail-root">

        <section class="detail-images">
            <span class="images-label meta-tag">
                <span class="prefix">//</span> project screenshots
            </span>

            <div id="image-stack">
                <div class="detail-img-frame">
                    <div class="placeholder"><span>// loading</span></div>
                </div>
            </div>
        </section>

        <aside class="detail-info">

            <a href="index.html" class="back-row">
                <span class="prefix">←</span> home
            </a>

            <a href="archive.html" class="back-row">
                <span class="prefix">←</span> all projects
            </a>

            <div class="info-block">
                <span class="block-label">
                    <span class="prefix">// </span>project.name
                </span>
                <h2 id="project-name">—</h2>
            </div>

            <div class="info-block">
                <span class="block-label">
                    <span class="prefix">// </span>description
                </span>
                <p id="project-desc">—</p>
            </div>

            <div class="info-block">
                <span class="block-label">
                    <span class="prefix">// </span>stack
                </span>
                <div class="stack-tags" id="project-stack">—</div>
            </div>

            <a href="#" class="github-link" id="project-github" target="_blank" rel="noopener noreferrer">
                <span class="prefix">// </span>github
            </a>

        </aside>

    </div>

    <script src="js/main.js"></script>
</body>

</html>
